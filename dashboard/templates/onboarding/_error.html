<div class="onboarding-error">
  <div class="error-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="32" height="32">
      <circle cx="12" cy="12" r="10" stroke-width="2"/>
      <line x1="15" y1="9" x2="9" y2="15" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <p class="error-message">{{ error }}</p>
  <div class="onboarding-actions">
    <button type="button" class="btn btn-ghost" onclick="history.back()">Try again</button>
  </div>
</div>
