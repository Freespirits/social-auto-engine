<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="Social Engine - Multi-channel social media platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7b61ff"/>
      <stop offset="100%" stop-color="#ff4d8d"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>

  <g opacity="0.3">
    <circle cx="120" cy="80" r="2" fill="#fff"/>
    <circle cx="320" cy="420" r="1.5" fill="#fff"/>
    <circle cx="1380" cy="120" r="2" fill="#fff"/>
    <circle cx="1200" cy="450" r="1.5" fill="#fff"/>
    <circle cx="900" cy="60" r="1" fill="#fff"/>
    <circle cx="60" cy="300" r="1.5" fill="#fff"/>
    <circle cx="1450" cy="300" r="1" fill="#fff"/>
  </g>

  <g transform="translate(1080,250)">
    <circle r="180" fill="url(#hub)"/>

    <line x1="0" y1="0" x2="-220" y2="-130" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="-260" y2="0" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="-220" y2="130" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="220" y2="-130" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="220" y2="130" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>

    <g filter="url(#glow)">
      <circle r="60" fill="#0a0a14" stroke="url(#accent)" stroke-width="2"/>
      <text x="0" y="8" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-size="22" font-weight="700">SAE</text>
    </g>

    <g transform="translate(-220,-130)">
      <circle r="38" fill="#1877F2"/>
      <text x="0" y="7" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">f</text>
    </g>
    <g transform="translate(-260,0)">
      <circle r="38" fill="#E1306C"/>
      <text x="0" y="7" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">IG</text>
    </g>
    <g transform="translate(-220,130)">
      <circle r="38" fill="#0A66C2"/>
      <text x="0" y="7" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">in</text>
    </g>
    <g transform="translate(220,-130)">
      <circle r="38" fill="#000"/>
      <text x="0" y="8" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700">X</text>
    </g>
    <g transform="translate(220,130)">
      <circle r="38" fill="#010101"/>
      <text x="0" y="7" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700">TT</text>
    </g>
  </g>

  <g transform="translate(80,180)">
    <text x="0" y="0" fill="#fff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-size="78" font-weight="800" letter-spacing="-2">Social Auto Engine</text>
    <rect x="0" y="20" width="320" height="6" fill="url(#accent)"/>
    <text x="0" y="80" fill="#cfd2dc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="500">One dashboard. Five platforms. Every post approved.</text>
    <text x="0" y="130" fill="#7b8194" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="400">AI content - human approval - scales 1 to 100 pages</text>

    <g transform="translate(0,170)">
      <rect x="0" y="0" width="160" height="34" rx="17" fill="#1a2236" stroke="#2a3553"/>
      <text x="80" y="22" text-anchor="middle" fill="#a7b1d4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">17 content skills</text>

      <rect x="172" y="0" width="160" height="34" rx="17" fill="#1a2236" stroke="#2a3553"/>
      <text x="252" y="22" text-anchor="middle" fill="#a7b1d4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">37 MCP tools</text>

      <rect x="344" y="0" width="190" height="34" rx="17" fill="#1a2236" stroke="#2a3553"/>
      <text x="439" y="22" text-anchor="middle" fill="#a7b1d4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">approval-first design</text>
    </g>
  </g>
</svg>
